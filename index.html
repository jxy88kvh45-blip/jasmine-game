<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Jasmine ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  text-align: center;
  color: #fff;
}

h1 { font-size: 20px; margin: 10px; }
p { font-size: 14px; margin: 0; }

#score { margin: 8px; }

#gameArea {
  position: relative;
  width: 95vw;
  height: 60vh;
  margin: auto;
  border: 2px solid #fff;
  border-radius: 12px;
  overflow: hidden;
  touch-action: none; /* IMPORTANT */
}

#basket {
  position: absolute;
  bottom: 10px;
  width: 70px;
  height: 70px;
  font-size: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  left: 50%;
  transform: translateX(-50%);
}

.momo {
  position: absolute;
  font-size: 30px;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: white;
  color: #ff4d6d;
  margin-top: 10px;
}

/* Proposal */
#proposalBox {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
</style>
</head>

<body>

<h1>🥟 Jasmine’s Momo Game ❤️</h1>
<p>Catch 12 momos</p>

<div id="score">Score: 0</div>

<div id="gameArea">
  <div id="basket">💖</div>

  <div id="proposalBox">
    <h2>🌸 Jasmine… will you go out with me? 💖</h2>
    <button onclick="yesClicked()">Yes 💖</button>
    <button onclick="restartGame()">Play Again 😄</button>
  </div>
</div>

<button onclick="startGame()">Start Game</button>

<script>
let gameArea = document.getElementById("gameArea");
let basket = document.getElementById("basket");
let scoreDisplay = document.getElementById("score");
let proposalBox = document.getElementById("proposalBox");

let score = 0;
let gameRunning = false;
let isDragging = false;

/* START GAME */
function startGame() {
  score = 0;
  gameRunning = true;
  proposalBox.style.display = "none";
  scoreDisplay.innerText = "Score: 0";
  dropMomo();
}

/* MOVE FUNCTION */
function moveBasket(e) {
  let rect = gameArea.getBoundingClientRect();
  let x = e.clientX - rect.left - basket.offsetWidth / 2;
  x = Math.max(0, Math.min(x, rect.width - basket.offsetWidth));
  basket.style.left = x + "px";
}

/* POINTER EVENTS */
gameArea.addEventListener("pointerdown", (e) => {
  isDragging = true;
  gameArea.setPointerCapture(e.pointerId);
  moveBasket(e);
});

gameArea.addEventListener("pointermove", (e) => {
  if (!isDragging) return;
  moveBasket(e);
});

gameArea.addEventListener("pointerup", () => {
  isDragging = false;
});

gameArea.addEventListener("pointercancel", () => {
  isDragging = false;
});

/* SAFARI TOUCH BACKUP */
gameArea.addEventListener("touchstart", (e) => {
  isDragging = true;
  moveBasket(e.touches[0]);
});

gameArea.addEventListener("touchmove", (e) => {
  if (!isDragging) return;
  moveBasket(e.touches[0]);
});

gameArea.addEventListener("touchend", () => {
  isDragging = false;
});

/* MOMO DROP */
function dropMomo() {
  if (!gameRunning) return;

  let momo = document.createElement("div");
  momo.className = "momo";
  momo.innerText = "🥟";

  momo.style.left = Math.random() * (gameArea.clientWidth - 30) + "px";
  momo.style.top = "0px";

  gameArea.appendChild(momo);

  let fall = setInterval(() => {
    let top = parseFloat(momo.style.top);
    momo.style.top = top + 4 + "px";

    let b = basket.getBoundingClientRect();
    let m = momo.getBoundingClientRect();

    if (
      m.bottom >= b.top &&
      m.left < b.right &&
      m.right > b.left
    ) {
      score++;
      scoreDisplay.innerText = "Score: " + score;
      momo.remove();
      clearInterval(fall);

      if (score >= 12) endGame();
    }

    if (top > gameArea.clientHeight) {
      momo.remove();
      clearInterval(fall);
    }

  }, 20);

  setTimeout(dropMomo, 800);
}

/* END GAME */
function endGame() {
  gameRunning = false;
  proposalBox.style.display = "flex";
}

function yesClicked() {
  proposalBox.innerHTML = "<h2>🥰 She said YES! ❤️</h2>";
}

function restartGame() {
  location.reload();
}
</script>

</body>
</html>
